<!-- Advanced Floating WhatsApp Widget (Bottom-Left) -->
<div class="whatsapp-widget-container" id="whatsappCTA">
  <button
    type="button"
    class="whatsapp-trigger-btn pulsing"
    aria-label="Contact on WhatsApp"
  >
    <i class="fab fa-whatsapp"></i>
    <span>Order via WhatsApp</span>
  </button>
  <div class="whatsapp-agents-panel glass-card">
    <div
      class="panel-header border-bottom border-secondary border-opacity-25 pb-2 mb-2"
    >
      <span class="fw-bold text-white small d-block"
        >Connect with our Experts</span
      >
      <span class="text-gray x-small">Select an agent or ask a Quick FAQ</span>
    </div>
    <div class="d-flex flex-column gap-2">
      <a
        href="javascript:void(0)"
        onclick="openWhatsAppChat('923379912300')"
        class="agent-link d-flex align-items-center p-2 rounded text-decoration-none"
      >
        <div
          class="agent-avatar bg-orange me-2 d-flex align-items-center justify-content-center text-white fw-bold"
        >
          SEO
        </div>
        <div class="text-start">
          <span class="text-white small fw-bold d-block">SEO & Ads Expert</span>
          <span class="text-orange x-small"
            ><span class="online-dot"></span>Online • Agent 1</span
          >
        </div>
        <i class="fab fa-whatsapp ms-auto text-success"></i>
      </a>
      <a
        href="javascript:void(0)"
        onclick="openWhatsAppChat('923146348900')"
        class="agent-link d-flex align-items-center p-2 rounded text-decoration-none"
      >
        <div
          class="agent-avatar bg-success me-2 d-flex align-items-center justify-content-center text-white fw-bold"
        >
          DEV
        </div>
        <div class="text-start">
          <span class="text-white small fw-bold d-block">Web & App Expert</span>
          <span class="text-orange x-small"
            ><span class="online-dot"></span>Online • Agent 2</span
          >
        </div>
        <i class="fab fa-whatsapp ms-auto text-success"></i>
      </a>
    </div>

    <!-- Quick Enquiries Section -->
    <div
      class="panel-faq-section mt-3 pt-2 border-top"
    >
      <div class="d-flex align-items-center mb-3">
        <div
          class="icon-circle bg-orange bg-opacity-10 me-2"
          style="
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <i class="fas fa-bolt text-orange" style="font-size: 0.7rem"></i>
        </div>
        <span class="fw-bold text-white small m-0">Quick Enquiries / FAQs</span>
      </div>
      <div
        id="waWidgetQuickFaqs"
        class="d-flex flex-column gap-2 mb-3"
        style="max-height: 150px; overflow-y: auto"
      >
        <!-- Dynamically populated by JS based on dropdown selections -->
      </div>
    </div>

    <!-- Dynamic WhatsApp Chat section -->
    <div
      class="panel-faq-section mt-3 pt-2 border-top"
    >
      <div class="d-flex align-items-center mb-3">
        <div
          class="icon-circle bg-orange bg-opacity-10 me-2"
          style="
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <i class="fas fa-briefcase text-orange" style="font-size: 0.7rem"></i>
        </div>
        <span class="fw-bold text-white small m-0">Project Enquiries</span>
      </div>
      <div class="d-flex flex-column gap-2">
        <select class="premium-select mb-2" id="waWidgetService">
                        <option value="" disabled selected>Select Service...</option>
                    </select>
        <select class="premium-select" id="waWidgetLocation">
                        <option value="" disabled selected>Select Location...</option>
                    </select>
        <a
          href="javascript:void(0)"
          onclick="openWhatsAppChat()"
          id="waWidgetChatBtn"
          class="premium-whatsapp-btn text-white w-100 fw-bold mt-3 d-flex align-items-center justify-content-center text-decoration-none"
        >
          <i class="fab fa-whatsapp me-2 fs-5"></i> Chat with Expert
        </a>
      </div>
    </div>
  </div>
</div>
