<!-- Advanced Floating WhatsApp Widget (Bottom-Left) -->
<div class="whatsapp-widget-container" id="whatsappCTA">
  <button
    type="button"
    class="whatsapp-trigger-btn pulsing"
  >
    <i class="fab fa-whatsapp" aria-hidden="true"></i>
    <span>Order via WhatsApp</span>
  </button>
  <div class="whatsapp-agents-panel">
    <div
      class="panel-header border-bottom border-white border-opacity-10 pb-2 mb-2 position-relative"
    >
      <span class="fw-bold text-white small d-block"
        >Connect with our Experts</span
      >
      <span class="text-gray x-small">Select an agent or ask a Quick FAQ</span>
      <button class="btn-close btn-close-white position-absolute top-0 end-0 mt-1" aria-label="Close widget" onclick="document.querySelector('.whatsapp-trigger-btn').click()" style="font-size: 0.6rem;"></button>
    </div>
    <div class="d-flex flex-column gap-2">
      <a
        href="javascript:void(0)"
        onclick="openWhatsAppChat('923379912300')"
        class="agent-link d-flex align-items-center p-2 rounded text-decoration-none"
      >
        <div
          class="agent-avatar bg-orange me-2 d-flex align-items-center justify-content-center text-white fw-bold"
        >
          SEO
        </div>
        <div class="text-start">
          <span class="text-white small fw-bold d-block">SEO & Ads Expert</span>
          <span class="text-orange x-small"
            ><span class="online-dot"></span>Online • Agent 1</span
          >
        </div>
        <i class="fab fa-whatsapp ms-auto text-white text-opacity-75" aria-hidden="true"></i>
      </a>
      <a
        href="javascript:void(0)"
        onclick="openWhatsAppChat('923146348900')"
        class="agent-link d-flex align-items-center p-2 rounded text-decoration-none"
      >
        <div
          class="agent-avatar bg-orange me-2 d-flex align-items-center justify-content-center text-white fw-bold"
        >
          DEV
        </div>
        <div class="text-start">
          <span class="text-white small fw-bold d-block">Web & App Expert</span>
          <span class="text-orange x-small"
            ><span class="online-dot"></span>Online • Agent 2</span
          >
        </div>
        <i class="fab fa-whatsapp ms-auto text-white text-opacity-75" aria-hidden="true"></i>
      </a>
    </div>

    <!-- Quick Enquiries Section -->
    <div
      class="panel-faq-section mt-3 pt-2 border-top border-white border-opacity-10"
    >
      <div class="d-flex align-items-center mb-3">
        <div class="icon-circle-sm bg-orange bg-opacity-10 me-2">
          <i class="fas fa-bolt text-orange" style="font-size: 0.7rem" aria-hidden="true"></i>
        </div>
        <span class="fw-bold text-white small m-0">Quick Enquiries / FAQs</span>
      </div>
      <div
        id="waWidgetQuickFaqs"
        class="d-flex flex-column gap-2 mb-2"
        style="max-height: 150px; overflow-y: auto"
      >
        <!-- Dynamically populated by JS based on dropdown selections -->
      </div>
    </div>
  </div>
</div>
